<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nuestra Historia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="buscador-container">
        <input type="text" id="buscador-input" placeholder="🔍 Buscar nuestro sitio especial...">
        <ul id="buscador-resultados"></ul>
    </div>

    <div id="map"></div>

    <div id="leyenda" class="leyenda-plegada">
        <div id="leyenda-cabecera">
            <h4 class="titulo-leyenda">📖 Nuestros Sitios <span>▼</span></h4>
        </div>
        <ul id="leyenda-lista"></ul>
    </div>

    <div id="controles-inferiores">
        <button id="btn-cambiar-mapa">🗺️ Cambiar a Calles</button>
        <button id="btn-gps">📍 Mi Ubicación</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
